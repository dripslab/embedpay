<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmbedPay Dev</title>
    <style>
      :root {
        color: #15202b;
        background: #eef3f7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(720px, 100%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #536471;
        line-height: 1.5;
      }

      form {
        display: grid;
        gap: 12px;
        margin: 24px 0;
      }

      label {
        display: grid;
        gap: 6px;
        color: #23313d;
        font-size: 14px;
        font-weight: 600;
      }

      input,
      select,
      button {
        min-height: 42px;
        border-radius: 6px;
        font: inherit;
      }

      input,
      select {
        width: 100%;
        border: 1px solid #c9d5df;
        padding: 8px 10px;
        background: #ffffff;
        color: #15202b;
      }

      button {
        width: fit-content;
        border: 0;
        padding: 0 16px;
        background: #1d9bf0;
        color: #ffffff;
        font-weight: 700;
        cursor: pointer;
      }

      #widget-root {
        min-height: 360px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>EmbedPay Dev</h1>
      <p>Use this local page to test the Stellar payment widget during development.</p>

      <form id="payment-form">
        <label>
          Destination
          <input id="destination" name="destination" placeholder="G..." required>
        </label>

        <label>
          Amount
          <input id="amount" name="amount" value="5" inputmode="decimal">
        </label>

        <label>
          Network
          <select id="network" name="network">
            <option value="testnet" selected>Testnet</option>
            <option value="mainnet">Mainnet</option>
          </select>
        </label>

        <button type="submit">Render widget</button>
      </form>

      <div id="widget-root"></div>
    </main>

    <script type="module">
      import EmbedPay from './index.js';

      const form = document.querySelector('#payment-form');
      const widgetRoot = document.querySelector('#widget-root');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const data = new FormData(form);
        const container = document.createElement('div');

        widgetRoot.replaceChildren(container);

        try {
          await EmbedPay.init({
            container,
            destination: data.get('destination'),
            amount: data.get('amount'),
            network: data.get('network'),
            onSuccess: (payment) => console.log('Payment confirmed', payment),
            onError: (error) => console.error('Payment failed', error)
          });
        } catch (error) {
          console.error(error);
        }
      });
    </script>
  </body>
</html>
